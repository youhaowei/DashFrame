name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Type Check & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: |
          bun format:check || (bun format && git diff && exit 1)

      - name: Run checks
        run: bun check

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Skip if e2e/web absent
        id: guard
        run: |
          if [ -d e2e/web ]; then
            echo "present=true" >>"$GITHUB_OUTPUT"
          else
            echo "present=false" >>"$GITHUB_OUTPUT"
            echo "e2e/web not present yet — no tests to run"
          fi

      - name: Setup Bun
        if: steps.guard.outputs.present == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        if: steps.guard.outputs.present == 'true'
        run: bun install --frozen-lockfile

      # The web E2E target runs a production `vite build`, which resolves
      # @wystack/* via their `import`/`default` conditions → `dist/*.js`. Those
      # dist files only exist after the submodule is built. (Typecheck/lint jobs
      # consume wystack *source* via the `bun` condition, so they don't need
      # this — but the bundler build does.)
      - name: Build WyStack submodule
        if: steps.guard.outputs.present == 'true'
        run: bun run build:wystack

      - name: Install Playwright browsers
        if: steps.guard.outputs.present == 'true'
        run: cd e2e/web && bun playwright install --with-deps chromium chromium-headless-shell

      - name: Run E2E tests
        if: steps.guard.outputs.present == 'true'
        run: cd e2e/web && bun run test:e2e:ci

      - name: Upload test results
        if: always() && steps.guard.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/web/test-results/
          retention-days: 7
